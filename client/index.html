<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Grayscale — A minimal image processing utility that converts color images to grayscale." />
  <title>Grayscale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ──────────────────────────────────────────
       Reset & Base
       ────────────────────────────────────────── */
    :root {
      --bg-dark: #000000;
      --bg-section: #0a0a0a;
      --border: #222222;
      --text-main: #ffffff;
      --text-muted: #666666;
      --accent: #ffffff;
      --success: #00ff00;
      --error: #ff0000;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border-radius: 0 !important;
      /* Force sharp corners */
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      letter-spacing: -0.01em;
    }

    /* ──────────────────────────────────────────
       Layout
       ────────────────────────────────────────── */
    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
    }

    header {
      grid-column: 1 / -1;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 0.9;
    }

    header p {
      margin-top: 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ──────────────────────────────────────────
       Sidebar / Form
       ────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      height: 100%;
    }

    .dropzone {
      border: 1px solid var(--border);
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      background: var(--bg-section);
      transition: border-color 0.2s;
    }

    .dropzone:hover {
      border-color: #444;
    }

    .dropzone.dragover {
      border-color: var(--accent);
      background: #111;
    }

    .dropzone-text {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .file-info {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .dropzone.has-file .dropzone-prompt {
      display: none;
    }

    .dropzone.has-file .file-info {
      display: flex;
    }

    .mini-preview {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 1px solid var(--border);
      filter: grayscale(1);
    }

    .file-details {
      text-align: left;
    }

    .file-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .btn-action {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-action:hover:not(:disabled) {
      background: var(--text-main);
      color: var(--bg-dark);
      border-color: var(--text-main);
    }

    .btn-action:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-action.primary {
      background: var(--text-main);
      color: var(--bg-dark);
      border-color: var(--text-main);
    }

    .btn-action.primary:hover:not(:disabled) {
      background: transparent;
      color: var(--text-main);
    }

    /* ──────────────────────────────────────────
       Status Section
       ────────────────────────────────────────── */
    .status-area {
      border: 1px solid var(--border);
      padding: 2rem 1.5rem;
      background: var(--bg-section);
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 200px;
    }

    .status-area.visible {
      display: block;
    }

    .status-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: block;
    }

    .status-value {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .status-value.processing {
      color: var(--text-main);
    }

    .status-value.success {
      color: var(--success);
    }

    .status-value.error {
      color: var(--error);
    }

    /* ──────────────────────────────────────────
       Main Content / Display
       ────────────────────────────────────────── */
    .display {
      position: relative;
      border: 1px solid var(--border);
      background: var(--bg-section);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      overflow: hidden;
    }

    .display-placeholder {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .comparison {
      display: none;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .comparison.visible {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .preview-box {
      position: relative;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .preview-box:last-child {
      border-right: none;
    }

    .preview-box header {
      padding: 0 1rem;
      min-height: 50px;
      background: #000;
      border-bottom: 1px solid var(--border);
      margin: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-box header h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .img-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      background: #080808;
      height: 0;
      /* Ensures flex container calculates height correctly */
    }

    .img-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 1px solid var(--border);
    }

    /* Preview footer removed */

    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
    }

    .loader.active {
      display: flex;
    }

    @keyframes progress {
      to {
        left: 100%;
      }
    }

    /* ──────────────────────────────────────────
       Cinematic AI Animations
       ────────────────────────────────────────── */
    /* ──────────────────────────────────────────
       Modern Skeleton Reveal UI
       ────────────────────────────────────────── */
    .skeleton-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%);
      background-size: 200% 100%;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
    }

    @media (prefers-reduced-motion: no-preference) {
      .skeleton-loader {
        animation: shimmer 2s infinite linear, breathing 3s ease-in-out infinite;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes breathing {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.015);
      }
    }

    .reveal-image {
      opacity: 0;
      transform: scale(1.04);
      transition:
        opacity 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.4s ease;
      width: 100%;
      height: 100%;
      object-fit: contain;
      will-change: transform, opacity;
      position: relative;
      z-index: 10;
    }

    .reveal-image.visible {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      padding: 2rem;
      text-align: center;
      transition: opacity 0.4s ease;
      z-index: 30;
    }

    .error-container.visible {
      opacity: 1;
    }

    /* ──────────────────────────────────────────
       Footer
       ────────────────────────────────────────── */
    footer {
      width: 100%;
      max-width: 1000px;
      margin-top: 4rem;
      border-top: 1px solid var(--border);
      padding-top: 2rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--text-main);
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 800px) {
      .container {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>

<body>

  <main class="container">
    <header>
      <h1>Grayscale</h1>
      <p>Image Processing Utility / V1.0</p>
    </header>

    <div class="sidebar">
      <form id="upload-form">
        <div class="dropzone" id="dropzone">
          <div class="dropzone-prompt">
            <span class="dropzone-text">Drop Image / Select File</span>
          </div>

          <div class="file-info" id="file-info">
            <div class="file-details">
              <div class="file-name" id="file-name">—</div>
              <div class="file-size" id="file-size">—</div>
            </div>
            <button type="button" class="btn-action" id="change-file-btn">Change</button>
          </div>

          <input type="file" id="file-input" accept="image/*" />
        </div>

        <div style="margin-top: 1rem;">
          <button type="submit" class="btn-action primary" id="upload-btn" disabled>Process Image</button>
        </div>
      </form>

      <div class="status-area" id="status-area">
        <span class="status-label">Image Status</span>
        <div class="status-value" id="status-title" style="margin-top: 0.5rem;">Ready</div>
        <p id="status-text"
          style="font-size: 0.7rem; color: var(--text-muted); line-height: 1.4; display: block; margin-top: 0.3rem;">
          Awaiting image selection...
        </p>
      </div>
    </div>

    <div class="display" id="display-region">
      <div id="display-placeholder" class="display-placeholder">No Image Loaded</div>


      <section class="comparison" id="comparison">
        <div class="preview-box">
          <header>
            <h2>Original</h2>
          </header>
          <div class="img-container">
            <img id="preview-image" alt="Original preview" />
          </div>
        </div>

        <div class="preview-box">
          <header style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Processed</h2>
            <div id="download-container" style="display: none;">
              <a id="download-link" href="#" target="_blank" class="btn-action"
                style="display: inline-block; padding: 0.3rem 0.6rem; font-size: 0.6rem; width: auto; text-transform: none; letter-spacing: 0;">Download
                Result</a>
            </div>
          </header>
          <div class="img-container" style="position: relative;">
            <div class="loader" id="processing-indicator"
              style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;">
              <div class="bar"></div>
              <span class="display-placeholder" style="font-size: 0.61rem;">Converting</span>
            </div>
            <div id="result-body"
              style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative;">
              <!-- Skeleton or Image will be injected here -->
            </div>
          </div>
        </div>
      </section>
    </div>

  </main>

  <script src="dist/client.js"></script>
</body>

</html>
