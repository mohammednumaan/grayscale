<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grayscale - Image Upload</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5f5;
        color: #333;
      }

      .container {
        background: #fff;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        font-weight: 500;
      }

      input[type="file"] {
        display: block;
        width: 100%;
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }

      button {
        width: 100%;
        padding: 0.6rem 1rem;
        background: #333;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 0.95rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      button:hover:not(:disabled) {
        background: #555;
      }

      #status {
        margin-top: 1rem;
        font-size: 0.9rem;
        min-height: 1.4em;
      }

      .success {
        color: #2e7d32;
      }

      .error {
        color: #c62828;
      }

      #preview {
        display: none;
        margin-top: 1.5rem;
      }

      #preview img {
        width: 100%;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Grayscale Upload</h1>
      <form id="upload-form">
        <label for="file-input">Select an image</label>
        <input type="file" id="file-input" accept="image/*" />
        <button type="submit" id="upload-btn">Upload</button>
      </form>
      <p id="status"></p>
      <div id="preview">
        <img id="preview-img" alt="Selected image preview" />
      </div>
    </div>
    <script src="dist/client.js"></script>
  </body>
</html>
